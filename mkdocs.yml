site_name: Charles AI notes
site_description: 面向扩散模型、VLM、VLA、量化、训练、推理、对比学习、世界模型与具身智能的中文知识库
docs_dir: files
exclude_docs: |
  roadmap/**
theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
plugins:
  - search
hooks:
  - hooks/paper_deep_dives_sort.py
extra_javascript:
  - assets/javascripts/term-tooltips.js
  - assets/javascripts/reading-controls.js
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - assets/stylesheets/extra.css
nav:
  - 首页: index.md
  - 术语表: glossary/index.md
  - 参考文献: references/index.md
  - 论文导读:
