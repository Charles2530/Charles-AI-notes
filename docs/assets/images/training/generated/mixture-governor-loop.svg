    <path d="M550 144c85 20 134 60 160 100M710 303c-24 51-76 88-160 97M370 399c-84-15-136-53-160-96M210 245c25-63 85-100 160-101" fill="none" stroke="#607d80" stroke-width="3" stroke-linecap="round"/>
