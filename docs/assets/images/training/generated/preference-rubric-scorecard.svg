<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">偏好标注 Rubric 评分卡</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">不要只问“哪个更好”，要拆成可校准、可复查、可反投机的评分维度。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18">
    <rect x="70" y="130" width="780" height="58" rx="14" fill="#eef6f4" stroke="#1a6d72"/><text x="110" y="166" font-weight="800" fill="#0f5558">事实正确性</text><text x="280" y="166" fill="#36595b">有没有编造，引用是否支持结论</text>
    <rect x="70" y="205" width="780" height="58" rx="14" fill="#fff6e8" stroke="#d59745"/><text x="110" y="241" font-weight="800" fill="#8b5a16">任务完成度</text><text x="280" y="241" fill="#36595b">是否真正解决用户目标，而不只是语气好</text>
    <rect x="70" y="280" width="780" height="58" rx="14" fill="#f5e4dc" stroke="#cb5d31"/><text x="110" y="316" font-weight="800" fill="#7f2f3a">风险边界</text><text x="280" y="316" fill="#36595b">该拒答时拒答，不该拒答时别过度保守</text>
    <rect x="70" y="355" width="780" height="58" rx="14" fill="#eef2ff" stroke="#6978b8"/><text x="110" y="391" font-weight="800" fill="#414d89">简洁与格式</text><text x="280" y="391" fill="#36595b">输出清楚、可执行，不用模板话术刷分</text>
  </g>
  <text x="98" y="462" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18" font-weight="800" fill="#9f4624">反投机检查：</text>
  <text x="222" y="462" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18" fill="#36595b">高分样本必须抽检“是否真的完成任务”。</text>
</svg>
