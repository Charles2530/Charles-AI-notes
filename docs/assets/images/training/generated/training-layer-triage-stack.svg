<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">训练问题分层排查栈</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">先判断问题属于哪一层，再决定该补数据、改目标、修系统，还是重做评测。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18">
    <rect x="70" y="125" width="780" height="62" rx="16" fill="#f5e4dc" stroke="#cb5d31"/>
    <text x="105" y="164" font-weight="800" fill="#7f2f3a">线上表现层</text><text x="260" y="164" fill="#36595b">用户反馈、任务完成、拒答边界、成本和时延</text>
    <rect x="95" y="202" width="730" height="62" rx="16" fill="#eef6f4" stroke="#1a6d72"/>
    <text x="130" y="241" font-weight="800" fill="#0f5558">评测证据层</text><text x="285" y="241" fill="#36595b">公共榜单、私有桶、消融、失败样本、线上 A/B</text>
    <rect x="120" y="279" width="680" height="62" rx="16" fill="#fff6e8" stroke="#d59745"/>
    <text x="155" y="318" font-weight="800" fill="#8b5a16">训练行为层</text><text x="310" y="318" fill="#36595b">loss、grad、LR、batch、packing、恢复一致性</text>
    <rect x="145" y="356" width="630" height="62" rx="16" fill="#eef2ff" stroke="#6978b8"/>
    <text x="180" y="395" font-weight="800" fill="#414d89">数据资产层</text><text x="335" y="395" fill="#36595b">来源、质量分、去重、混合比、回流原因、版本</text>
  </g>
  <path d="M455 187v15M455 264v15M455 341v15" stroke="#607d80" stroke-width="3" stroke-linecap="round"/>
  <text x="70" y="462" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="17" font-weight="800" fill="#9f4624">使用方法：</text>
  <text x="150" y="462" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="17" fill="#36595b">不要从最底层盲修，先从用户现象和评测证据向下追因。</text>
</svg>
