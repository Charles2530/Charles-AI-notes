<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">Checkpoint Manifest 必备字段</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">把 checkpoint 当产品资产管理：保存成功只是第一步，能恢复才算合格。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18">
    <rect x="70" y="130" width="360" height="260" rx="20" fill="#eef6f4" stroke="#1a6d72"/>
    <text x="105" y="170" font-size="24" font-weight="800" fill="#0f5558">训练状态</text>
    <text x="105" y="218" fill="#36595b">权重 / 梯度 / 优化器状态</text>
    <text x="105" y="258" fill="#36595b">LR scheduler / loss scale</text>
    <text x="105" y="298" fill="#36595b">RNG / sampler / global step</text>
    <text x="105" y="338" fill="#36595b">数据版本 / tokenizer 版本</text>
    <rect x="490" y="130" width="360" height="260" rx="20" fill="#fff6e8" stroke="#d59745"/>
    <text x="525" y="170" font-size="24" font-weight="800" fill="#8b5a16">系统状态</text>
    <text x="525" y="218" fill="#36595b">world size / rank map</text>
    <text x="525" y="258" fill="#36595b">TP / PP / DP / CP 配置</text>
    <text x="525" y="298" fill="#36595b">分片 hash / 文件大小</text>
    <text x="525" y="338" fill="#36595b">保存时间 / 原子提交标记</text>
  </g>
  <text x="85" y="445" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18" font-weight="800" fill="#9f4624">恢复前检查：</text>
  <text x="205" y="445" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18" fill="#36595b">字段完整、分片一致、数据位置连续、并行拓扑可重映射。</text>
</svg>
