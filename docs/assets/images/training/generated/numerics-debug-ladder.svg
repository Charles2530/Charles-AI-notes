<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">数值异常前 30 分钟排障图</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">先止血，再缩圈；不要一看到 NaN 就重训。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="18">
    <rect x="80" y="130" width="760" height="60" rx="16" fill="#f5e4dc" stroke="#cb5d31"/>
    <text x="115" y="168" font-weight="800" fill="#7f2f3a">0-5 分钟：止血</text><text x="300" y="168" fill="#36595b">暂停扩大灰度 / 保存现场 / 固定问题 step</text>
    <rect x="80" y="215" width="760" height="60" rx="16" fill="#fff6e8" stroke="#d59745"/>
    <text x="115" y="253" font-weight="800" fill="#8b5a16">5-15 分钟：分类</text><text x="300" y="253" fill="#36595b">数据 batch、grad norm、overflow、LR、rank-local</text>
    <rect x="80" y="300" width="760" height="60" rx="16" fill="#eef6f4" stroke="#1a6d72"/>
    <text x="115" y="338" font-weight="800" fill="#0f5558">15-30 分钟：缩圈</text><text x="300" y="338" fill="#36595b">小 batch 复现 / 单机复现 / 关闭 fused kernel 对照</text>
    <rect x="80" y="385" width="760" height="60" rx="16" fill="#eef2ff" stroke="#6978b8"/>
    <text x="115" y="423" font-weight="800" fill="#414d89">事后沉淀</text><text x="300" y="423" fill="#36595b">触发条件、检测脚本、回滚动作、长期修复项</text>
  </g>
  <path d="M460 190v25M460 275v25M460 360v25" stroke="#607d80" stroke-width="3" stroke-linecap="round"/>
</svg>
