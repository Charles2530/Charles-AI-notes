<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">评测风险分桶地图</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">平均分只适合做入口，真正决策要看分桶、方差和失败样本。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif">
    <rect x="70" y="130" width="170" height="130" rx="18" fill="#eef6f4" stroke="#1a6d72"/><text x="110" y="180" font-size="21" font-weight="800" fill="#0f5558">长度桶</text><text x="102" y="220" font-size="16" fill="#36595b">短 / 中 / 长</text>
    <rect x="270" y="130" width="170" height="130" rx="18" fill="#fff6e8" stroke="#d59745"/><text x="310" y="180" font-size="21" font-weight="800" fill="#8b5a16">任务桶</text><text x="298" y="220" font-size="16" fill="#36595b">问答 / 代码 / 工具</text>
    <rect x="470" y="130" width="170" height="130" rx="18" fill="#f5e4dc" stroke="#cb5d31"/><text x="510" y="180" font-size="21" font-weight="800" fill="#7f2f3a">风险桶</text><text x="500" y="220" font-size="16" fill="#36595b">安全 / 隐私 / 拒答</text>
    <rect x="670" y="130" width="170" height="130" rx="18" fill="#eef2ff" stroke="#6978b8"/><text x="710" y="180" font-size="21" font-weight="800" fill="#414d89">成本桶</text><text x="705" y="220" font-size="16" fill="#36595b">延迟 / token / GPU</text>
    <rect x="150" y="340" width="620" height="76" rx="20" fill="#ffffff" stroke="#b8c9c7"/>
    <text x="190" y="387" font-size="20" font-weight="800" fill="#14292b">发布规则：</text>
    <text x="300" y="387" font-size="20" fill="#36595b">总分提升 + 高风险桶不退 + 成本桶可接受</text>
  </g>
</svg>
