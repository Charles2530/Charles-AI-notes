<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">MTP / 投机解码上线看板</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">不要只看平均加速，必须把接受率、延迟和回退条件放在同一张图里。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif">
    <rect x="60" y="130" width="225" height="150" rx="18" fill="#eef6f4" stroke="#1a6d72"/>
    <text x="90" y="168" font-size="22" font-weight="800" fill="#0f5558">Acceptance</text>
    <text x="90" y="208" font-size="17" fill="#36595b">按长度桶 / 温度桶 / 任务桶</text>
    <text x="90" y="244" font-size="17" fill="#36595b">看平均接受 token 数</text>
    <rect x="345" y="130" width="225" height="150" rx="18" fill="#fff6e8" stroke="#d59745"/>
    <text x="375" y="168" font-size="22" font-weight="800" fill="#8b5a16">Latency</text>
    <text x="375" y="208" font-size="17" fill="#36595b">p50 / p95 / p99 分开看</text>
    <text x="375" y="244" font-size="17" fill="#36595b">关注 verify 开销</text>
    <rect x="630" y="130" width="225" height="150" rx="18" fill="#f5e4dc" stroke="#cb5d31"/>
    <text x="660" y="168" font-size="22" font-weight="800" fill="#7f2f3a">Fallback</text>
    <text x="660" y="208" font-size="17" fill="#36595b">低接受率自动回退</text>
    <text x="660" y="244" font-size="17" fill="#36595b">质量异常立即熔断</text>
    <rect x="90" y="345" width="740" height="70" rx="18" fill="#ffffff" stroke="#b8c9c7"/>
    <text x="125" y="389" font-size="19" font-weight="800" fill="#14292b">上线判定：</text>
    <text x="230" y="389" font-size="19" fill="#36595b">长输出桶收益稳定 + 主质量不退 + p99 不恶化 + 回退可验证</text>
  </g>
  <path d="M285 205h60M570 205h60" stroke="#607d80" stroke-width="3" stroke-linecap="round"/>
</svg>
