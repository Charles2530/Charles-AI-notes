<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" rx="28" fill="#fbfaf4"/>
  <text x="46" y="58" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="30" font-weight="800" fill="#14292b">输入管线指标地图</text>
  <text x="46" y="91" font-family="PingFang SC, Noto Sans SC, sans-serif" font-size="16" fill="#607d80">每一段都要有队列、耗时和错误率，否则 GPU 空转时无法定位。</text>
  <g font-family="PingFang SC, Noto Sans SC, sans-serif">
    <g font-size="18" font-weight="800" fill="#14292b">
      <rect x="40" y="165" width="130" height="90" rx="16" fill="#eef6f4" stroke="#1a6d72"/><text x="74" y="216">读取</text>
      <rect x="200" y="165" width="130" height="90" rx="16" fill="#eef6f4" stroke="#1a6d72"/><text x="234" y="216">解析</text>
      <rect x="360" y="165" width="130" height="90" rx="16" fill="#fff6e8" stroke="#d59745"/><text x="386" y="216">Tokenize</text>
      <rect x="520" y="165" width="130" height="90" rx="16" fill="#fff6e8" stroke="#d59745"/><text x="552" y="216">Packing</text>
      <rect x="680" y="165" width="130" height="90" rx="16" fill="#f5e4dc" stroke="#cb5d31"/><text x="722" y="216">GPU</text>
    </g>
    <g stroke="#607d80" stroke-width="3" stroke-linecap="round"><path d="M170 210h30M330 210h30M490 210h30M650 210h30"/></g>
    <g font-size="15" fill="#36595b">
      <text x="42" y="305">带宽、重试、缓存命中</text>
      <text x="205" y="305">解压、JSON/图像解码</text>
      <text x="362" y="305">CPU 时间、词表版本</text>
      <text x="525" y="305">padding 率、边界污染</text>
      <text x="682" y="305">等待时间、有效 token/s</text>
    </g>
    <rect x="95" y="375" width="730" height="68" rx="18" fill="#ffffff" stroke="#b8c9c7"/>
    <text x="130" y="418" font-size="18" font-weight="800" fill="#9f4624">排查顺序：</text>
    <text x="235" y="418" font-size="18" fill="#36595b">先找最长队列，再看最高 padding，最后看传输和 kernel overlap。</text>
  </g>
</svg>
